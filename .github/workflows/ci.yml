name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync --group dev

      - name: Qt platform deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 libegl1 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            xvfb

      - name: Run tests (Linux headless)
        if: runner.os == 'Linux'
        run: xvfb-run uv run pytest tests/ -v --tb=short -x

      - name: Run tests
        if: runner.os != 'Linux'
        run: uv run pytest tests/ -v --tb=short -x
